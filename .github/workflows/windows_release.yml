name: Flutter Windows Release

on:
  push:
    branches:
      - dev
      - main

jobs:
  build_windows:
    name: Build Windows Release
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2.0.1

      - name: Enable Windows support
        run: flutter config --enable-windows-desktop

      - name: Create .env file
        shell: bash
        run: |
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate build_runner outputs
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ailixir-windows-release
          path: build/windows/x64/runner/Release/

      - name: Extract version from pubspec.yaml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/[[:space:]]//g')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine release channel
        id: channel
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "suffix=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=-beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Package Release
        shell: powershell
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ailixir-windows-${{ steps.version.outputs.version }}${{ steps.channel.outputs.suffix }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}${{ steps.channel.outputs.suffix }}
          name: Release v${{ steps.version.outputs.version }}${{ steps.channel.outputs.suffix }}
          files: ailixir-windows-${{ steps.version.outputs.version }}${{ steps.channel.outputs.suffix }}.zip
          prerelease: ${{ steps.channel.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: false
